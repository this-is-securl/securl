name: Publish SecURL Package

on:
  workflow_dispatch:
  push:
    tags:
      - "securl-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup npm with trusted publishing support
        run: npm install --global npm@11.17.0

      - name: Verify release tag is based on main
        run: |
          git fetch origin main --depth=1
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run build:core
          npm run test:core

      - name: Publish SecURL package
        run: npm publish ./packages/core --access public
