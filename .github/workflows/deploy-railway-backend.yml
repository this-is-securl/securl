name: Deploy Railway Backend

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["SecURL Package Checks"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway token availability
        id: token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "RAILWAY_TOKEN is not configured; skipping Railway deploy."
          fi

      - name: Checkout
        if: steps.token.outputs.available == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        if: steps.token.outputs.available == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.token.outputs.available == 'true'
        run: npm ci

      - name: Install Railway CLI
        if: steps.token.outputs.available == 'true'
        run: npm install -g @railway/cli

      - name: Deploy and smoke-check Railway backend
        if: steps.token.outputs.available == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: npm run deploy:railway -- --message "Deploy SecURL backend ${GITHUB_SHA::7}"
