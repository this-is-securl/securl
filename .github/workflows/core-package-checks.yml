name: SecURL Package Checks

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm

      - name: Setup npm 12 security defaults
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build SecURL package
        run: npm run build:core

      - name: Run core tests
        run: npm run test:core

      - name: Lint repo
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Verify production build
        run: npm run build:hostinger && npm run verify

      - name: Package dry run
        run: npm pack --dry-run ./packages/core
